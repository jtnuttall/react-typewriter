name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/setup
      - name: Build
        run: pnpm build
      - name: Size check
        run: pnpm size
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: dist/
          retention-days: 1

  test:
    name: Test (Node ${{ matrix.node }}, React ${{ matrix.react }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: [24]
        react: [18, 19]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}
      - name: Set React version to ${{ matrix.react }}
        run: pnpm add -D react@${{ matrix.react }} react-dom@${{ matrix.react }}
      - name: Check format
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test

  publish:
    name: Publish to npm
    needs:
      - build
      - test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # Required for npm provenance
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          registry-url: 'https://registry.npmjs.org'
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: package-dist
          path: dist/
      - name: Publish to npm (dry run)
        run: echo pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
